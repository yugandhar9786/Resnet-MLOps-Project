apiVersion: apps/v1
kind: Deployment
metadata:
  name: resnet-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resnet-mlops
  template:
    metadata:
      labels:
        app: resnet-mlops
    spec:
      containers:
        - name: resnet-container
          image: yugandhar7/resnet-mlops:latest
          ports:
            - containerPort: 8000